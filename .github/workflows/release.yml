name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.1.0)'
        required: true
      macos_signing:
        description: 'Enable macOS code signing & notarization (requires active Apple developer account)'
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ===========================================
  # Desktop Builds
  # ===========================================
  build-desktop-linux:
    name: Desktop (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev protobuf-compiler libpcap-dev libxdo-dev

      - name: Build
        run: cargo build --package pentest-desktop --release --features pentest-platform/desktop-pcap

      - name: Package
        run: |
          mkdir -p dist
          cp target/release/pentest-connector dist/
          cd dist && tar -czvf pentest-connector-linux-x86_64.tar.gz pentest-connector

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-linux-x86_64
          path: dist/pentest-connector-linux-x86_64.tar.gz

  build-desktop-windows:
    name: Desktop (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install protoc
        run: choco install protoc -y

      - name: Build
        run: cargo build --package pentest-desktop --release

      - name: Sign Windows binary
        uses: azure/trusted-signing-action@v0.5.0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ secrets.AZURE_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ secrets.AZURE_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ secrets.AZURE_CERT_PROFILE }}
          files-folder: target/release
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item target/release/pentest-connector.exe dist/
          Compress-Archive -Path dist/pentest-connector.exe -DestinationPath dist/pentest-connector-windows-x86_64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-windows-x86_64
          path: dist/pentest-connector-windows-x86_64.zip

  build-desktop-macos:
    name: Desktop (macOS)
    runs-on: macos-latest
    strategy:
      matrix:
        target: [x86_64-apple-darwin, aarch64-apple-darwin]
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Install protobuf
        run: brew install protobuf

      - name: Build
        run: cargo build --package pentest-desktop --release --target ${{ matrix.target }} --features pentest-platform/desktop-pcap

      - name: Import Apple certificate
        if: inputs.macos_signing == true
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          echo "$APPLE_CERTIFICATE_P12" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $RUNNER_TEMP/certificate.p12 -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychains -d user -s $KEYCHAIN_PATH login.keychain-db

      - name: Sign macOS binary
        if: inputs.macos_signing == true
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          codesign --force --options runtime \
            --entitlements entitlements.plist \
            --sign "Developer ID Application: Devo Inc. ($APPLE_TEAM_ID)" \
            target/${{ matrix.target }}/release/pentest-connector

      - name: Notarize macOS binary
        if: inputs.macos_signing == true
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          ditto -c -k --keepParent target/${{ matrix.target }}/release/pentest-connector $RUNNER_TEMP/pentest-connector.zip
          for attempt in 1 2 3; do
            echo "Notarization attempt $attempt..."
            if xcrun notarytool submit $RUNNER_TEMP/pentest-connector.zip \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_APP_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --wait --timeout 30m; then
              echo "Notarization succeeded."
              break
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "Notarization failed, retrying in 30s..."
              sleep 30
            else
              echo "Notarization failed after $attempt attempts."
              exit 1
            fi
          done

      - name: Package
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/pentest-connector dist/
          cd dist && tar -czvf pentest-connector-macos-${{ matrix.target == 'aarch64-apple-darwin' && 'aarch64' || 'x86_64' }}.tar.gz pentest-connector

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-macos-${{ matrix.target == 'aarch64-apple-darwin' && 'aarch64' || 'x86_64' }}
          path: dist/pentest-connector-macos-*.tar.gz

  # ===========================================
  # Web Build
  # ===========================================
  build-web:
    name: Web (Liveview)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev protobuf-compiler libpcap-dev

      - name: Build
        run: cargo build --package pentest-web --release --features pentest-platform/desktop-pcap

      - name: Package
        run: |
          mkdir -p dist
          cp target/release/pentest-web dist/
          cd dist && tar -czvf ../pentest-connector-web.tar.gz pentest-web

      - uses: actions/upload-artifact@v4
        with:
          name: web-wasm
          path: pentest-connector-web.tar.gz

  # ===========================================
  # Android Build
  # ===========================================
  build-android:
    name: Android
    if: false  # Disabled: Android build has pre-existing compile issues
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,x86_64-linux-android
      - uses: Swatinem/rust-cache@v2

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager "ndk;26.1.10909125"

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Install Dioxus CLI
        run: curl -sSLf https://dioxus.dev/install.sh | bash

      - name: Build APK
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/26.1.10909125
        run: |
          export PATH="$HOME/.dx/bin:$PATH"
          unset C_INCLUDE_PATH CPLUS_INCLUDE_PATH
          dx build --platform android --package pentest-mobile --release

      - name: Package
        run: |
          mkdir -p dist
          cp target/dx/pentest-mobile/release/android/app/app/build/outputs/apk/release/app-release-unsigned.apk \
             dist/pentest-connector-android.apk 2>/dev/null || \
          cp target/dx/pentest-mobile/release/android/app/app/build/outputs/apk/debug/app-debug.apk \
             dist/pentest-connector-android.apk

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: dist/pentest-connector-android.apk

  # ===========================================
  # iOS Build (requires macOS + signing)
  # ===========================================
  build-ios:
    name: iOS
    if: false  # Disabled: iOS build requires Apple signing setup
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim
      - uses: Swatinem/rust-cache@v2

      - name: Install Dioxus CLI
        run: curl -sSLf https://dioxus.dev/install.sh | sh

      - name: Build (Simulator)
        run: |
          export PATH="$HOME/.dx/bin:$PATH"
          dx build --platform ios --package pentest-mobile --release || echo "iOS build requires signing"

      # Note: Real iOS builds require Apple Developer signing
      - name: Package (if built)
        run: |
          mkdir -p dist
          if [ -d "target/dx/pentest-mobile/release/ios" ]; then
            cd target/dx/pentest-mobile/release/ios
            zip -r ../../../../../dist/pentest-connector-ios.zip .
          else
            echo "iOS build artifacts not found (signing required)"
            touch dist/pentest-connector-ios-placeholder.txt
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: dist/pentest-connector-ios*

  # ===========================================
  # Headless (pentest-agent) Builds
  # ===========================================
  build-headless-linux:
    name: Headless (Linux x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler libpcap-dev

      - name: Build
        run: cargo build --package pentest-headless --release --features pentest-platform/desktop-pcap

      - name: Package
        run: |
          mkdir -p dist
          cp target/release/pentest-agent dist/
          cd dist && tar -czvf pentest-agent-linux-x86_64.tar.gz pentest-agent

      - uses: actions/upload-artifact@v4
        with:
          name: headless-linux-x86_64
          path: dist/pentest-agent-linux-x86_64.tar.gz

  build-headless-windows:
    name: Headless (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install protoc
        run: choco install protoc -y

      - name: Build
        run: cargo build --package pentest-headless --release

      - name: Sign Windows binary
        uses: azure/trusted-signing-action@v0.5.0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ secrets.AZURE_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ secrets.AZURE_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ secrets.AZURE_CERT_PROFILE }}
          files-folder: target/release
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item target/release/pentest-agent.exe dist/
          Compress-Archive -Path dist/pentest-agent.exe -DestinationPath dist/pentest-agent-windows-x86_64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: headless-windows-x86_64
          path: dist/pentest-agent-windows-x86_64.zip

  build-headless-macos:
    name: Headless (macOS ${{ matrix.target == 'aarch64-apple-darwin' && 'aarch64' || 'x86_64' }})
    runs-on: macos-latest
    strategy:
      matrix:
        target: [x86_64-apple-darwin, aarch64-apple-darwin]
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Install protobuf
        run: brew install protobuf

      - name: Build
        run: cargo build --package pentest-headless --release --target ${{ matrix.target }} --features pentest-platform/desktop-pcap

      - name: Import Apple certificate
        if: inputs.macos_signing == true
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          echo "$APPLE_CERTIFICATE_P12" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $RUNNER_TEMP/certificate.p12 -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychains -d user -s $KEYCHAIN_PATH login.keychain-db

      - name: Sign macOS binary
        if: inputs.macos_signing == true
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          codesign --force --options runtime \
            --entitlements entitlements.plist \
            --sign "Developer ID Application: Devo Inc. ($APPLE_TEAM_ID)" \
            target/${{ matrix.target }}/release/pentest-agent

      - name: Notarize macOS binary
        if: inputs.macos_signing == true
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          ditto -c -k --keepParent target/${{ matrix.target }}/release/pentest-agent $RUNNER_TEMP/pentest-agent.zip
          for attempt in 1 2 3; do
            echo "Notarization attempt $attempt..."
            if xcrun notarytool submit $RUNNER_TEMP/pentest-agent.zip \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_APP_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --wait --timeout 30m; then
              echo "Notarization succeeded."
              break
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "Notarization failed, retrying in 30s..."
              sleep 30
            else
              echo "Notarization failed after $attempt attempts."
              exit 1
            fi
          done

      - name: Package
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/pentest-agent dist/
          cd dist && tar -czvf pentest-agent-${{ matrix.target == 'aarch64-apple-darwin' && 'darwin-aarch64' || 'darwin-x86_64' }}.tar.gz pentest-agent

      - uses: actions/upload-artifact@v4
        with:
          name: headless-macos-${{ matrix.target == 'aarch64-apple-darwin' && 'aarch64' || 'x86_64' }}
          path: dist/pentest-agent-*.tar.gz

  # ===========================================
  # Create Release
  # ===========================================
  release:
    name: Create Release
    needs: [build-desktop-linux, build-desktop-windows, build-desktop-macos, build-web, build-headless-linux, build-headless-windows, build-headless-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" -o -name "*.apk" \) -exec cp {} release/ \;
          ls -la release/

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          fi

      - name: Generate checksums
        working-directory: release
        run: |
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Pentest Connector v${{ steps.version.outputs.version }}
          files: |
            release/*
          body: |
            ## Pentest Connector v${{ steps.version.outputs.version }}

            ### Downloads

            | Platform | Architecture | Download |
            |----------|--------------|----------|
            | Linux | x86_64 | `pentest-connector-linux-x86_64.tar.gz` |
            | Windows | x86_64 | `pentest-connector-windows-x86_64.zip` |
            | macOS | x86_64 | `pentest-connector-macos-x86_64.tar.gz` |
            | macOS | Apple Silicon | `pentest-connector-macos-aarch64.tar.gz` |
            | Web | WASM | `pentest-connector-web.tar.gz` |
            | Android | APK | `pentest-connector-android.apk` |

            #### Headless (pentest-agent)

            | Platform | Architecture | Download |
            |----------|--------------|----------|
            | Linux | x86_64 | `pentest-agent-linux-x86_64.tar.gz` |
            | Windows | x86_64 | `pentest-agent-windows-x86_64.zip` |
            | macOS | x86_64 | `pentest-agent-darwin-x86_64.tar.gz` |
            | macOS | Apple Silicon | `pentest-agent-darwin-aarch64.tar.gz` |

            ### Checksums

            See `SHA256SUMS.txt` for file checksums.

