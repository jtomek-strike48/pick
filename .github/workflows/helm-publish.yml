name: Helm Publish

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write
  packages: write
  pages: write

env:
  REGISTRY: ghcr.io
  CHART_PATH: chart/pick-connector

jobs:
  helm:
    name: Package & Publish Helm Chart
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Set chart version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          sed -i "s/^version:.*/version: ${VERSION}/" ${{ env.CHART_PATH }}/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" ${{ env.CHART_PATH }}/Chart.yaml

      - name: Lint chart
        run: helm lint ${{ env.CHART_PATH }}

      - name: Package chart
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p .helm-packages
          helm package ${{ env.CHART_PATH }} -d .helm-packages

      # Publish to OCI registry (GHCR)
      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

      - name: Push chart to GHCR (OCI)
        if: github.event_name != 'pull_request'
        run: |
          PKG=$(ls .helm-packages/pick-connector-*.tgz)
          helm push "$PKG" oci://${{ env.REGISTRY }}/strike48-public

      # Publish to GitHub Pages (traditional helm repo)
      - name: Checkout gh-pages branch
        if: github.event_name != 'pull_request'
        uses: actions/checkout@v5
        with:
          ref: gh-pages
          path: gh-pages
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Initialize gh-pages if needed
        if: github.event_name != 'pull_request'
        run: |
          cd gh-pages
          if [ ! -f index.yaml ]; then
            echo "Initializing Helm chart repository..."
            cat > index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html>
          <head><title>Pick Helm Charts</title></head>
          <body>
          <h1>Pick Connector Helm Charts</h1>
          <p>Add this repository:</p>
          <pre>helm repo add pick https://strike48-public.github.io/pick</pre>
          <p>Install:</p>
          <pre>helm install pick pick/pick-connector</pre>
          </body>
          </html>
          HTMLEOF
          fi

      - name: Update Helm repo index
        if: github.event_name != 'pull_request'
        run: |
          cp .helm-packages/*.tgz gh-pages/
          cd gh-pages
          helm repo index . --url https://strike48-public.github.io/pick

      - name: Push to gh-pages
        if: github.event_name != 'pull_request'
        run: |
          cd gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet || git commit -m "Update Helm chart repository"
          git push
